<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | KovaiLabs</title>
  <meta name="description" content="Deep dives on AI implementation, domain engineering, and what's actually working in production — from the KovaiLabs team." />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Kovai<span>Labs</span></a>
    <ul class="nav-links">
      <li><a href="index.html#domains">Domains</a></li>
      <li><a href="index.html#how">How We Work</a></li>
      <li><a href="index.html#stack">AI Stack</a></li>
      <li><a href="index.html#leadership">Team</a></li>
      <li><a href="blog.html" style="color: var(--text-primary);">Blog</a></li>
      <li><a href="index.html#contact" class="nav-cta">Start a Project</a></li>
    </ul>
  </nav>

  <section class="section" style="padding-top: 80px;">

    <!-- BLOG LIST VIEW -->
    <div id="list-view">
      <div style="margin-bottom: 56px;">
        <div class="section-label" style="margin-bottom: 20px;">Insights</div>
        <h1 style="font-size: clamp(2.2rem, 5vw, 3.5rem); margin-bottom: 16px;">
          AI in the <span class="gradient-text">real world</span>
        </h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 560px; line-height: 1.7;">
          Practical perspectives on implementing AI across domains — written by the engineers doing the work.
        </p>
      </div>
      <div class="blog-grid" id="blog-list"></div>
    </div>

    <!-- POST VIEW (hidden until a post is opened) -->
    <div id="post-view" style="display:none; max-width: 780px; margin: 0 auto;">
      <button onclick="showBlogList()" style="background:none; border:none; cursor:pointer; color:var(--accent); font-size:0.88rem; font-weight:700; padding:0; margin-bottom:36px; display:inline-flex; align-items:center; gap:8px;">
        &larr; Back to all articles
      </button>
      <div style="color:var(--accent); font-size:0.75rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px;" id="view-date"></div>
      <h1 id="view-title" aria-live="polite" style="font-size: clamp(1.8rem, 4vw, 2.8rem); margin-bottom: 48px; line-height: 1.2;">&nbsp;</h1>
      <div id="view-content" style="white-space: pre-wrap; line-height: 1.9; color: var(--text-secondary); font-size: 1.05rem; font-weight: 400;"></div>
    </div>

  </section>

  <footer>
    &copy; 2026 KovaiLabs &mdash; AI Use-Case Implementation. All Rights Reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
